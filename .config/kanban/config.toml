[buildcop]
enabled = true

[[buildcop.boards]]
name                  = "Build Cop: main"
repo_path             = "/home/jamison/code/onyx"
branch                = "main"
failure_threshold     = 0.01
min_runs              = 5
green_streak_required = 3
window_days           = 3
interval              = 10

[[buildcop.boards]]
name                  = "Build Cop: onyx"
repo_path             = "/home/jamison/code/onyx"
failure_threshold     = 0.10
min_runs              = 5
green_streak_required = 10
window_days           = 5

[devcontainer]
mounts = ['type=bind,source=/run/user/1000/ssh-agent.socket,target=/tmp/ssh-agent.sock']
run_args = ['--cap-add=SYS_PTRACE']

[devcontainer.container_env]
SSH_AUTH_SOCK = '/tmp/ssh-agent.sock'

[errors]
enabled = true

[merge]
allow_merge_commit = false
allow_rebase = false

[plans]
dir = './plans'

[sync]
allow_merge = false
